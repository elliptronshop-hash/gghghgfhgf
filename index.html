<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Pages Site</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            text-align: center;
        }
        .container {
            background: #f4f4f9;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #24292e;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.2rem;
            color: #586069;
        }
        .status-badge {
            display: inline-block;
            background: #28a745;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: bold;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Site Successfully Published!</h1>
        <p>If you can see this, your GitHub Pages site is officially back online.</p>
        <div class="status-badge">Status: Live</div>
        <hr style="margin: 2rem 0; border: 0; border-top: 1px solid #ddd;">
        <p style="font-size: 0.9rem;">Edit this file in your repository to change this content.</p>
    </div>
</body>
</html>
